# =============================================================================
# Jekyll config for GitHub Pages — serves /docs.
# =============================================================================
# Setup (one-time, after push):
#   GitHub repo → Settings → Pages → Build and deployment:
#     Source:  "Deploy from a branch"
#     Branch:  main  /  /docs
#     Save.
# Site goes live at: https://silicondoritos.github.io/jetson-rt-stack/  (~2 min build)
#
# Uses the `just-the-docs` remote theme — purpose-built for technical
# documentation: built-in left-nav, top search, code highlighting, copy
# buttons, dark mode, mobile-friendly. No vendoring required.
# =============================================================================

title:        jetson-rt-stack
description:  Custom RT L4T R36.5 image for Jetson Orin NX 16GB — Axelera Metis + Stereolabs ZED X + Isaac ROS, PREEMPT_RT tuned for real-time vision workloads

url:          https://silicondoritos.github.io
baseurl:      /jetson-rt-stack

remote_theme: just-the-docs/just-the-docs

# --- just-the-docs config -------------------------------------------------
# https://just-the-docs.com/docs/configuration/

search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

heading_anchors: true

# Footer ("Edit this page on GitHub" links).
gh_edit_link:        true
gh_edit_link_text:   Edit this page on GitHub
gh_edit_repository:  https://github.com/silicondoritos/jetson-rt-stack
gh_edit_branch:      main
gh_edit_source:      docs
gh_edit_view_mode:   tree

# External link in the nav header.
nav_external_links:
  - title:        GitHub Repository
    url:          https://github.com/silicondoritos/jetson-rt-stack
    hide_icon:    false

# Dark mode by default; user can toggle with the navbar control.
color_scheme: dark

# Callouts for war-story / warning / note blocks.
callouts:
  warning:
    title:    Warning
    color:    red
  important:
    title:    Important
    color:    yellow
  note:
    title:    Note
    color:    blue
  warstory:
    title:    War story
    color:    purple
  tip:
    title:    Tip
    color:    green

# --- Jekyll plugins (only those allowed by github-pages) ------------------
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

# --- Files to exclude from the built site ---------------------------------
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - "_archive/"

# --- Defaults: every page gets layout: default unless overridden ----------
defaults:
  - scope:
      path:    ""
      type:    "pages"
    values:
      layout:  "default"
